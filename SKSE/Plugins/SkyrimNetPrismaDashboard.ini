[Dashboard]
; Full URL to your SkyrimNet instance, including port.
; Default http://localhost:8080/ works for most setups.
; If it doesn't, replace with your local IP, e.g. http://192.168.1.100:8080/
URL=http://localhost:8080/

; Last visited page — updated automatically, do not edit manually.
LastPage=http://localhost:8080/

; Keep the menu rendered without focus (1 = yes, 0 = no).
KeepBackground=1

; Always open the base URL instead of resuming the last visited page (1 = yes, 0 = no).
DefaultHome=0

; Pause Skyrim while the dashboard is focused (1 = yes, 0 = no).
PauseGame=0
HotKey=62
Version=2
WinX=1036px
WinY=120px
WinW=1244px
WinH=794px
WinZoom=1.4
WinFs=0
